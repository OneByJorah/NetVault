# NetVault NOC - Default Configuration

# Server
SERVER_NAME: netvault.local
SECRET_KEY: your-secret-key

# Database
DATABASE_URL: sqlite:///netvault.db

# FTP
FTP_ENABLED: true
FTP_HOST: 127.0.0.1
FTP_PORT: 21
FTP_USER: netvault
FTP_PASS: netvault123
FTP_SSL: true

# SFTP
SFTP_ENABLED: true
SFTP_HOST: 127.0.0.1
SFTP_PORT: 22

# TFTP
TFTP_ENABLED: true
TFTP_HOST: 127.0.0.1
TFTP_PORT: 69
TFTP_ROOT: /var/lib/netvault/tftp

# Oxidized
OXIDIZED_ENABLED: true
OXIDIZED_URL: http://localhost:8080
OXIDIZED_API_KEY: your-api-key

# Git
GIT_ENABLED: true
GIT_REPO: /var/lib/netvault/configs
GIT_BRANCH: main

# Cloud Sync
CLOUD_SYNC: false
RCLONE_CONFIG: /etc/netvault/rclone.conf

# Notifications
SLACK_WEBHOOK:
TEAMS_WEBHOOK:
DISCORD_WEBHOOK:
EMAIL_ENABLED: false
EMAIL_SERVER:
EMAIL_USER:
EMAIL_PASS:
